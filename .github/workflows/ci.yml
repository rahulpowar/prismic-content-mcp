name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Check lockfile drift
        run: uv lock --check

      - name: Sync dependencies (locked)
        run: uv sync --frozen --extra dev

      - name: Run tests
        run: uv run pytest -q
